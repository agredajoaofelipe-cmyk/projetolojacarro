<!DOCTYPE html>
<html lang="pr-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
            <div class="form-body">
                <h1 class="form-titulo">venda fácil seu carro</h1>
                <p>Dscreve as características do carro e marque os opcionais que ele possui</p>
                <form>
                    <div class="caixaInputs">
                        <label for="tittle">Título do anuncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="tittle" id="tittle"class="block" placeholder="Digite um Titulo" minlength="1" maxlength="30" required> 
                    </div>

                     <div class="caixaInputs">
                        <label for="preco">preco</label><span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco"class="block" placeholder="Digite o preco" required> 
                    </div>

                    <div class="caixaInputs">
                        <label for="descricao">Descrição</label>
                        <textarea name="descricao" id="descricao" class="block" placeholder="faça descriçao do seu veículo aqui"></textarea>
                    </div>

                     <div class="caixaInputs">
                        <label for="marca">marca</label><span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca"class="block" placeholder="Digite a marca" required> 
                    </div>

                    <div class="caixaInputs">
                        <label for="modelo">Modelo</label><span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo"class="block" placeholder="Digite o modelo" required> 
                    </div>

                    <div class="caixaInputs">
                        <label for="kilometragem">kilometragem</label><span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem"class="block" placeholder="Digite o kilometragem" required> 
                    </div>

                     <div class="caixaInputs">
                        <label for="data-compra">data-compra</label><span class="campo-obrigatorio">*</span></label>
                        <input type="date" name="data-compra" id="data-compra"class="block" required> 
                    </div>

                    <div class="caixaInputs">
                       <p>Tipo de cambio: <span class="campo-obrigatorio">*</span></p>
                       <input type="radio" name="marcha" id="manual">
                        <label for="manual">Manual</label>

                    </div>
                    <div class="caixaOpcional">
                        <p>Opcionais</p>
                        <ul class="listaOpcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                                <label for="airbag">Airbag</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="ar-condicionado" value="ar-condicionado">
                                <label for="ar-condicionado">Ar condicionado</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="camera-de-re" value="camera-de-re">
                                <label for="camera-de-re">Camera de re</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                                <label for="alarme">Alarme</label>
                            </li>
                        </ul>
                    </div>
                    <ul class="listaOpcionais">
                        <li>
                            <input type="checkbox" name="opcional[]" id="assitente-pista" value="camera-re">
                                <label for="assitente-pista">Assitente de pista</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="partidaSemChave" value="partidaSemChave">
                                <label for="partidaSemChave">Partida sem chave</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="smartphone" value="smartphone">
                                <label for="smartphone">Intregraçao com Celular</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="banco-couro" value="banco-couro">
                                <label for="banco-couro">Banco-couro</label>
                        </li>
                    </ul>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
